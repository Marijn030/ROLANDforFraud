remark: eptn_gat
out_dir: results
device: auto
seed: 2

dataset:
  format: eptn
  name: eptn.pkl
  dir: data
  is_hetero: False
  task: node
  shuffle: True
  task_type: classification
  transductive: True
  split: [0.8, 0.1, 0.1]
  augment_feature: []
  augment_feature_dims: [0]
  augment_feature_repr: position
  augment_label: ''
  augment_label_dims: 0
  transform: none
  node_encoder: False
  edge_encoder: False
  edge_dim: 2

train:
  batch_size: 1
  eval_period: 5
  ckpt_period: 10
  mode: standard
  auto_resume: False
  early_stopping: True
  patience: 10

model:
  type: gnn
  loss_fun: cross_entropy
  graph_pooling: add

gnn:
  layers_pre_mp: 1
  layers_mp: 2
  layers_post_mp: 2
  dim_inner: 32
  layer_type: gatconv
  stage_type: stack
  batchnorm: True
  act: prelu
  dropout: 0.2
  agg: add
  att_heads: 4
  normalize_adj: False

optim:
  optimizer: adam
  base_lr: 0.001
  max_epoch: 100